<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Oi amor 💕</title>
  <meta name="description" content="Tocou em mim 💕" />

  <!-- PWA standalone (tela cheia, sem barra do navegador) -->
  <meta name="theme-color" content="#1a0a1a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Oi amor" />
  <link rel="manifest" href="./manifest-nfc.json" />
  <link rel="icon" type="image/png" sizes="192x192" href="./icons/icon-192.png" />
  <link rel="apple-touch-icon" href="./icons/icon-192.png" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Inter:wght@200;300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./css/nfc.css" />
</head>
<body>
  <!-- Background de corações caindo -->
  <div class="hearts-rain" id="hearts-rain" aria-hidden="true"></div>

  <!-- Tela principal -->
  <main class="nfc-screen">
    <div class="nfc-content">
      <div class="nfc-emoji" id="nfc-emoji">💕</div>
      <h1 class="nfc-title" id="nfc-title">Oi, amor!</h1>
      <p class="nfc-sub" id="nfc-sub">Você tocou na nossa tag 💖</p>
      <p class="nfc-from" id="nfc-from">— Rafael</p>

      <button class="nfc-btn" id="nfc-btn" type="button">
        <span class="nfc-btn-text">Entrar no nosso cantinho</span>
        <span class="nfc-btn-arrow">→</span>
      </button>

      <p class="nfc-hint">ou encoste de novo no chaveiro 💫</p>
    </div>
  </main>

  <script src="./js/nfc.js"></script>
</body>
</html>
