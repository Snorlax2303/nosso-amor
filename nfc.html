<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Oi amor 💕</title>
  <meta name="description" content="Tocou em mim 💕" />

  <!-- PWA standalone (tela cheia, sem barra do navegador) -->
  <meta name="theme-color" content="#1a0a1a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Oi amor" />
  <link rel="manifest" href="./manifest-nfc.json" />
  <link rel="icon" type="image/png" sizes="192x192" href="./icons/icon-192.png" />
  <link rel="apple-touch-icon" href="./icons/icon-192.png" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Inter:wght@200;300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./css/nfc.css" />
</head>
<body>

  <!-- Corações caindo (em todas as fases) -->
  <div class="hearts-rain" id="hearts-rain" aria-hidden="true"></div>

  <!-- Orbs ambientes -->
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <!-- ============================================
       FASE 1 — TAP INICIAL (3 toques = revelar)
       ============================================ -->
  <main class="nfc-screen nfc-phase-1" id="phase-1">
    <div class="phase-content">
      <div class="nfc-emoji-big">💕</div>
      <h1 class="nfc-title">Você tocou em mim</h1>
      <p class="nfc-sub">Aperta o coração 3 vezes</p>
      <button class="nfc-heart-btn" id="heart-tap" type="button" aria-label="Tocar">
        <span class="heart-icon">💖</span>
      </button>
      <p class="tap-counter" id="tap-counter">0/3</p>
    </div>
  </main>

  <!-- ============================================
       FASE 2 — FOTO + FRASE
       ============================================ -->
  <main class="nfc-screen nfc-phase-2" id="phase-2" style="display:none">
    <div class="phase-content phase-photo">
      <!-- Foto do casal (vem da capa do app) -->
      <div class="photo-frame">
        <img id="nfc-photo" src="./assets/fotos/medium/floater-1.webp" alt="Nós dois" />
        <div class="photo-shine"></div>
      </div>
      <h1 class="nfc-title-big">13 anos. 1 mensagem.<br> Pra sempre. ✨</h1>
      <p class="nfc-sub">— desde 01 de janeiro de 2014</p>

      <button class="nfc-btn" id="btn-open-letter" type="button">
        <span class="btn-text">Toque pra abrir</span>
        <span class="btn-arrow">→</span>
      </button>
    </div>
  </main>

  <!-- ============================================
       FASE 3 — MÚSICA + TEXTO LETRA POR LETRA
       ============================================ -->
  <main class="nfc-screen nfc-phase-3" id="phase-3" style="display:none">
    <div class="phase-content phase-letter">
      <!-- Player YouTube (escondido, só áudio) -->
      <div class="yt-audio" id="yt-audio"></div>

      <!-- Ícone de "toca disco" pulsando -->
      <div class="music-disc">
        <div class="disc-inner">🎵</div>
        <div class="disc-pulse"></div>
      </div>

      <!-- Texto da carta, aparece letra por letra -->
      <div class="typewriter-container">
        <p class="typewriter" id="typewriter"></p>
        <span class="typewriter-caret" id="caret">▌</span>
      </div>

      <!-- "Assinatura" depois do texto -->
      <p class="nfc-signature" id="signature" style="display:none">— Rafael ♡</p>
    </div>
  </main>

  <!-- ============================================
       FASE 4 — TELA FINAL (entrar no app + instalar)
       ============================================ -->
  <main class="nfc-screen nfc-phase-4" id="phase-4" style="display:none">
    <div class="phase-content">
      <div class="final-hearts">💕 💖 💗</div>
      <h1 class="nfc-title" id="phase4-title">Tá pronta?</h1>
      <p class="nfc-sub" id="phase4-sub">Vem pro nosso cantinho ✨</p>

      <!-- Botão principal (muda de texto conforme PWA instalado) -->
      <button class="nfc-btn nfc-btn-final" id="btn-enter" type="button">
        <span class="btn-text" id="btn-enter-text">Entrar no nosso cantinho</span>
        <span class="btn-arrow">→</span>
      </button>

      <!-- Botão de instalar PWA (só aparece se NÃO instalado) -->
      <button class="nfc-btn nfc-btn-install" id="btn-install" type="button" style="display:none">
        <span class="btn-text">📲 Instalar no celular</span>
        <span class="btn-arrow">↓</span>
      </button>

      <p class="nfc-hint" id="phase4-hint">ou encoste de novo no chaveiro 💫</p>
    </div>
  </main>

  <script src="./js/nfc.js?v=26"></script>
</body>
</html>
